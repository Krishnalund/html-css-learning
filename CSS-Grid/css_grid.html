<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="css_grid.css">
    </head>
    <body>
        <div class="grid-one">
            <div class="lightblue">200px</div>
            <div class="lightpink">75px</div>
        </div>
        <div class="grid-two">
            <div class="lightblue">50px</div>
            <div class="lightpink">remaining space</div>
            <div class="lightblue">75px</div>
        </div>

        <div class="grid-four-columns">
            <div class="lightblue">col1</div>
            <div class="lightpink">col2</div>
            <div class="lightblue">col3</div>
            <div class="lightpink">col4</div>

            <div class="lightblue">col1</div>
            <div class="lightpink">col2</div>
            <div class="lightblue">col3</div>
            <div class="lightpink">col4</div>          
        </div>

        <div class="grid-profiles">
            <div class="profile">
                <img class="profile-picture" src="cat.jpg">
                <p class="name">Oliver</p>
                <p class="mutual-friends">2 mutual friends</p>
                <button>Add Friend</button>
            </div>
            <div class="profile">
                <img class="profile-picture" src="cat2.jpg">
                <p class="name">Mimi</p>
                <p class="mutual-friends">3 mutual friends</p>
                <button>Add Friend</button>
            </div>
            <div class="profile">
                <img class="profile-picture" src="dog.jpg">
                <p class="name">Rex</p>
                <p class="mutual-friends">4 mutual friends</p>
                <button>Add Friend</button>
            </div>
        </div>
    </body>
</html>
